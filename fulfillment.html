
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>풀필먼트 연동하기</title>

  <style>
    :root{
      --bg:#F6F7FB;
      --card:#FFFFFF;
      --text:#111827;
      --muted:#6B7280;
      --line:#E5E7EB;

      --poomgo:#0040D1;
      --poomgo-weak: rgba(0,64,209,.10);

      --naver:#16A34A;
      --naver-weak: rgba(22,163,74,.10);

      --danger:#DC2626;
      --danger-weak:#FEF2F2;
      --danger-border:#FECACA;

      --ok:#16A34A;
      --ok-weak:#ECFDF5;
      --ok-border:#BBF7D0;

      --shadow: 0 10px 28px rgba(17,24,39,.08);
      --shadow2: 0 18px 40px rgba(17,24,39,.12);

      --radius2: 22px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Pretendard, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:26px 18px 56px;
    }

    .top{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }

    .title{
      font-size:22px;
      font-weight:800;
      margin:0;
      letter-spacing:-.02em;
    }

    .sub{
      margin:6px 0 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius2);
      box-shadow:var(--shadow);
    }

    .topActions {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .pageLink {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:38px;
      padding:0 14px;
      border-radius:12px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
      text-decoration:none;
      font-weight:800;
      font-size:13px;
    }

    .notice{
      margin-top:14px;
      padding:16px 16px;
      border:1px solid var(--danger-border);
      background:var(--danger-weak);
    }

    .notice .n-title{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:800;
      margin:0;
      color:var(--danger);
      font-size:15px;
      letter-spacing:-.01em;
      line-height:1.45;
    }

    .steps{
      margin-top:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .step{
      padding:16px;
      position:relative;
      overflow:hidden;
    }

    .stepHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .leftHead{
      display:flex;
      align-items:flex-start;
      gap:10px;
      min-width:0;
      flex:1 1 auto;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:28px;
      padding:0 10px;
      border-radius:999px;
      background:var(--poomgo-weak);
      color:var(--poomgo);
      font-weight:800;
      font-size:12px;
      letter-spacing:.02em;
      white-space:nowrap;
      flex:0 0 auto;
      line-height:1;
    }

    .badge.completed{
      background: var(--ok-weak);
      color: var(--ok);
    }

    .hgroup{ min-width:0; }

    .h-title{
      margin:0;
      font-size:16px;
      font-weight:800;
      letter-spacing:-.02em;
      line-height:1.25;
    }

    .h-desc{
      margin:4px 0 0;
      font-size:13px;
      color:var(--muted);
      line-height:1.45;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      align-items:center;
      align-self:center;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      height:36px;
      padding:0 12px;
      border-radius:12px;
      font-weight:800;
      font-size:13px;
      line-height:1;
      cursor:pointer;
      transition:.15s ease;
      white-space:nowrap;
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 18px rgba(17,24,39,.08);
    }

    .btnOk{
      border-color:transparent;
      background:var(--ok);
      color:#fff;
    }

    .stepBody{ display:block; }
    .collapsed .stepBody{ display:none; }
    .collapsed .stepHeader{ margin-bottom:0; }

    .step.isLocked .stepBody{ display:none; }
    .step.isLocked .actions .btn{ opacity:.45; pointer-events:none; margin:0 !important; }

    .lockHint{
      display:none;
      margin:-4px 0 10px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#F9FAFB;
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      line-height:1.45;
    }

    .step.isLocked .lockHint{ display:block; }

    .imgRow{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    .imgCard{
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      background:#fff;
    }

    .pathBlock{
      padding:12px 12px;
      border-bottom:1px solid var(--line);
      background: var(--poomgo-weak);
      border-left: 6px solid var(--poomgo);
      display:flex;
      gap:12px;
      align-items:center;
      border-top-left-radius:12px;
      border-top-right-radius:12px;
    }

    .pathBadge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:36px;
      padding:0 12px;
      border-radius:12px;
      background:#fff;
      border:1px solid rgba(0,64,209,.22);
      color:var(--poomgo);
      font-size:13px;
      font-weight:800;
      flex:0 0 auto;
    }

    .pathText{
      font-size:16px;
      font-weight:800;
      color:var(--text);
      line-height:1.35;
      word-break:break-word;
    }

    .pathBlock[data-platform="naver"]{
      background: var(--naver-weak);
      border-left-color: var(--naver);
    }

    .pathBlock[data-platform="naver"] .pathText{
      color: var(--naver);
    }

    .pathBlock[data-platform="naver"] .pathBadge{
      color: var(--naver);
      border-color: rgba(22,163,74,.28);
    }

    .imgLabel{
      padding:10px 12px;
      font-weight:900;
      font-size:13px;
      border-bottom:1px solid var(--line);
      background:#FFFFFF;
    }

    .imgDesc{
      padding:0 12px 12px;
      font-size:14px;
      font-weight:800;
      color:var(--text);
      line-height:1.45;
    }

    .descSmall{
      font-size:13px;
      font-weight:700;
      color:var(--muted);
    }

    .imgWrap{
      padding:12px;
      background:#fff;
    }

    .imgWrap img{
      width:100%;
      border-radius:14px;
      display:block;
      border:1px solid var(--line);
      cursor:zoom-in;
    }

    .imgHint{
      margin:8px 0 0;
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      text-align:right;
      line-height:1.45;
    }

    .modalBack{
      position:fixed;
      inset:0;
      background:rgba(17,24,39,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:50;
    }

    .modal{
      width:min(1280px, 98vw);
      max-height:94vh;
      overflow:auto;
      background:#fff;
      border-radius:22px;
      box-shadow:var(--shadow2);
      border:1px solid rgba(255,255,255,.25);
    }

    .modalHead{
      position:sticky;
      top:0;
      background:#fff;
      border-bottom:1px solid var(--line);
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      z-index:2;
    }

    .modalTitle{
      margin:0;
      font-size:14px;
      font-weight:900;
    }

    .modalClose{
      height:34px;
      padding:0 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      cursor:pointer;
      font-weight:900;
    }

    .modalBody{
      padding:14px 16px 18px;
    }

    .zoomImg{
      width:100%;
      border-radius:16px;
      border:1px solid var(--line);
      display:block;
    }

    .confirmBack{
      position:fixed;
      inset:0;
      background:rgba(17,24,39,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:60;
    }

    .confirm{
      width:min(520px, 96vw);
      background:#fff;
      border-radius:22px;
      box-shadow:var(--shadow2);
      border:1px solid rgba(255,255,255,.2);
      overflow:hidden;
    }

    .confirmBody{
      padding:16px 16px 10px;
    }

    .confirmTitle{
      margin:0;
      font-size:16px;
      font-weight:900;
      line-height:1.35;
    }

    .confirmDesc{
      margin:8px 0 0;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      line-height:1.5;
    }

    .confirmFoot{
      display:flex;
      gap:8px;
      padding:12px 16px 16px;
      justify-content:flex-end;
      border-top:1px solid var(--line);
      background:#FAFAFB;
    }

    .finalMsg{
      margin-top:14px;
      padding:16px;
      border:1px solid var(--ok-border);
      background:var(--ok-weak);
    }

    .finalMsg p{
      margin:0;
      font-weight:900;
      font-size:15px;
      letter-spacing:-.01em;
      color:#166534;
      line-height:1.5;
    }

    @media (max-width: 640px) {
      .top{
        flex-direction:column;
        align-items:flex-start;
      }

      .title{
        font-size:20px;
      }

      .pathBlock{
        align-items:flex-start;
      }

      .pathBadge{
        height:30px;
      }

      .pathText{
        font-size:14px;
      }

      .imgDesc{
        font-size:13px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 class="title" id="pageTitle"></h1>
        <p class="sub">각 STEP 확인 후 <b>완료</b>를 체크해야 다음 단계가 열립니다.</p>
      </div>

      <div class="topActions">
        <a href="./index.html" class="pageLink">고객사 등록 가이드로 돌아가기</a>
      </div>
    </div>

    <div class="card notice">
      <p class="n-title" id="noticeTitle"></p>
    </div>

    <div class="steps" id="stepsContainer"></div>

    <div class="card finalMsg" id="finalMsg" style="display:none;">
      <p>✅ 풀필먼트 연동 작업을 완료하였을 경우 품고 담당자에게 완료 여부를 회신 부탁드립니다!</p>
    </div>
  </div>

  <div class="modalBack" id="zoomBack">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modalHead">
        <p class="modalTitle" id="zoomTitle">이미지 확대</p>
        <button class="modalClose" id="zoomClose" type="button">닫기</button>
      </div>
      <div class="modalBody">
        <img class="zoomImg" id="zoomImg" src="" alt="zoom" />
      </div>
    </div>
  </div>

  <div class="confirmBack" id="confirmBack">
    <div class="confirm" role="dialog" aria-modal="true">
      <div class="confirmBody">
        <p class="confirmTitle">다음 과정을 확인하시겠습니까?</p>
        <p class="confirmDesc">확인을 누르면 다음 단계가 열립니다.</p>
      </div>
      <div class="confirmFoot">
        <button class="btn" id="confirmCancel" type="button">취소</button>
        <button class="btn btnOk" id="confirmOk" type="button">확인</button>
      </div>
    </div>
  </div>

  <script>
    function driveThumb(fileId, widthPx) {
      return 'https://drive.google.com/thumbnail?id=' + fileId + '&sz=w' + String(widthPx || 1600);
    }

    function normalizeDriveId(raw) {
      const s = String(raw || '').trim();
      const m = s.match(/([a-zA-Z0-9_-]{20,})/);
      return m ? m[1] : '';
    }

    function placeholderImage(label) {
      const safe = (label && String(label).trim()) ? String(label).trim() : '이미지';
      const svg =
        `<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700">
          <rect width="100%" height="100%" fill="#F3F4F6"/>
          <rect x="40" y="40" width="1120" height="620" rx="24" fill="#FFFFFF" stroke="#E5E7EB"/>
          <text x="600" y="330" font-family="Pretendard, Arial" font-size="28" font-weight="800"
            text-anchor="middle" fill="#6B7280">${safe}</text>
          <text x="600" y="390" font-family="Pretendard, Arial" font-size="16" font-weight="700"
            text-anchor="middle" fill="#9CA3AF">Drive 이미지 ID를 입력하면 자동으로 표시됩니다</text>
        </svg>`;
      return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
    }

    function packImages(items) {
      return (items || []).map((it) => {
        const id = normalizeDriveId(it.id);
        const label = it.label || '';
        const path = it.path || '';
        const desc = it.desc || '';

        if (!id) {
          const ph = placeholderImage(label);
          return { label, path, desc, thumb: ph, zoom: ph };
        }

        return {
          label,
          path,
          desc,
          thumb: driveThumb(id, 1600),
          zoom: driveThumb(id, 7000),
        };
      });
    }

    const STEP1 = [
      {
        id: '1Eq77tr-udjZP4wL0bU07zgq41BNiwd1K',
        path: '품고 나우 > 주문 > 판매처 계정 > 판매처 계정 개별등록 클릭해주세요.',
        desc: ''
      },
      {
        id: '1960PiBa39LqSL1as5oIAOnYHM2-nuzHI',
        path: '판매처명, 브랜드명, 연동계정을 입력합니다',
        desc:
          '▪️판매처명 : 스마트스토어(물류사)<br>' +
          '▪️브랜드명 : 값 선택<br>' +
          '▪️연동 계정 : API 연동용 판매자 ID 입력<br><br>' +
          '<span class="descSmall">' +
          'API 연동용 판매자 ID 확인 방법 : 스마트스토어 > 스토어 관리 > 서비스 연결 > API 관리 > API 연동용 판매자 ID' +
          '</span>'
      }
    ];

    const STEP2 = [
      { id: '1D4AyxFxoGes0hCqZg-k1LadeK6sikv14', path: '스마트스토어 > 스토어 관리 > 서비스 연결 > 네이버 서비스 연결 > 네이버 풀필먼트 > 풀필먼트 계약 연동을 클릭해주세요.', desc: '' },
      { id: '1rpD-_srL-MmVyZW58RrNnIpDdwKcuNpm', path: '물류사 품고 체크 후 확인을 클릭해주세요.', desc: '' },
      { id: '1INjzFisbIQLH0VsdT1gamz_NRbSGX3Bu', path: '풀필먼트 계약 연동을 위한 정보 제공 동의 및 안내사항을 모두 확인 및 체크 후 확인을 클릭해주세요.', desc: '' },
    ];

    const STEP3 = [
      { id: '1ZB1Ed8PEPBXcEZISY5gENSAcjedI8Z9x', path: '품고 나우 > (신)OMS > 판매처 연동 설정 > 설정 > 연동 설정을 클릭해주세요.', desc: '판매처 계정이 스마트스토어(물류사)로 등록되어있지 않을 경우 조회가 되지 않습니다.' },
      { id: '1bPunmva14dFv604YlW0309LdLQDWVw5M', path: '연동 설정 팝업 내용 숙지 후 확인을 클릭해주세요.', desc: '' },
      { id: '10SQY6oAOVzf1000B2dE80H-C4klC4jya', path: '첫 화면에서는 다음 버튼을 클릭해주세요.', desc: '' },
      { id: '1Q2ddmfOfMTwbxm3VdrQnV9a2Fm1zl9iq', path: '품고에 등록한 연동 계정과 실제 네이버 연동 계정의 값이 일치하는지 확인 후 다음을 클릭해주세요.', desc: '일치하지 않을 경우 판매처 계정 내 연동 계정을 수정 후 재 진행해야합니다.' },
      { id: '17T7tdjljRxNtfZk4J7w2kb9p181D_QI-', path: '스마트스토어 풀필먼트 계약연동 신청 상태가 연동 완료로 되어있는지 확인 후 다음을 클릭해주세요.', desc: '만약 연동완료로 노출되지 않을 경우 풀필먼트 계약 연동 상태가 확인중으로 되어있는지 체크 후 품고로 문의 부탁드립니다.' },
      { id: '1XbISZ8829-yMLSe_icdejlHFR50yBrYR', path: '연동 완료 팝업 내용 확인 후 확인 버튼을 클릭해주세요', desc: '' },
      { id: '1bYFdof7gZztTn4WLFhxbAP8FHjoEW2kn', path: '연동 설정이 완료되었습니다. 문구를 확인 후 완료 버튼을 클릭해주세요.', desc: '' },
    ];

    const STEP4 = [
      { id: '1D4AyxFxoGes0hCqZg-k1LadeK6sikv14', path: '스마트스토어 > 스토어 관리 > 서비스 연결 > 네이버 서비스 연결 > 네이버 풀필먼트 > 풀필먼트 계약 연동을 클릭해주세요.', desc: '' },
      { id: '1y9fKffyxAs0KEm5ICjpuDbDqgt9cjbBZ', path: '물류사 연동 상태가 연동됨으로 변경되었는지 확인해주세요.', desc: '연동중으로 노출될 경우 정상 연동 완료된 상태입니다.' },
      { id: '1NTXOak8xFsdgkOFiHcoxnwr8zxRmFspb', path: '연동됨 상태로 변경되었을 시 N배송 프로그램 이용 > 프로그램 약관 동의를 클릭해주세요.', desc: '' },
      { id: '1rbJAgGWTnvv_cQuVEmf2fxbtxgkQkJ_1', path: 'N배송 프로그램 약관 동의 및 안내사항 내용을 확인 후 동의 체크 > 확인을 클릭해주세요.', desc: '' },
      { id: '1UV5nzr2ntZTDterYTK86XRcnw4RsQhov', path: '네이버 풀필먼트 = 설정함, N배송 프로그램 이용 = 이용중으로 노출이 완료 될 경우 풀필먼트 연동 작업이 완료되었습니다.', desc: ''},
    ];

    const model = {
      appTitle: '풀필먼트 연동하기',
      noticeTitle: '⚠️ 풀필먼트 연동 이후 임의로 N배송을 설정하지 않도록 주의 부탁드립니다.',
      steps: [
        { no: 1, title: '판매처 계정 등록', desc: '아래 화면을 참고하여 판매처 계정 등록을 완료합니다.', images: packImages(STEP1) },
        { no: 2, title: '풀필먼트 연동 신청하기', desc: '아래 화면을 참고하여 풀필먼트 연동 신청을 진행합니다.', images: packImages(STEP2) },
        { no: 3, title: '풀필먼트 연동 완료하기', desc: '아래 화면을 참고하여 풀필먼트 연동을 완료합니다.', images: packImages(STEP3) },
        { no: 4, title: '풀필먼트 연동 완료 점검 & N배송 프로그램 이용 동의', desc: '아래 화면을 참고하여 연동 점검 및 N배송 프로그램 이용 동의를 완료합니다.', images: packImages(STEP4) },
      ]
    };

    if (localStorage.getItem('customerRegisterDone') !== 'Y') {
      alert('고객사 등록 완료 확인 후 접근 가능합니다.');
      location.href = './index.html';
    }

    let completedSteps = [];
    const steps = model.steps;
    const maxStep = Math.max(...steps.map(s => Number(s.no)));

    const isCompleted = (n) => completedSteps.includes(n);
    const isLocked = (n) => n > 1 && !isCompleted(n - 1);

    function renderPage() {
      document.title = model.appTitle;
      document.getElementById('pageTitle').textContent = model.appTitle;
      document.getElementById('noticeTitle').textContent = model.noticeTitle;
      renderSteps();
    }

    function renderSteps() {
      const container = document.getElementById('stepsContainer');
      container.innerHTML = '';

      steps.forEach((s) => {
        const section = document.createElement('section');
        section.className = 'card step';
        section.id = `step${s.no}`;
        section.dataset.step = s.no;

        const imagesHtml = s.images.map((im) => `
          <div class="imgCard">
            ${im.path ? `
              <div class="pathBlock" data-platform="${(s.no === 2 || s.no === 4) ? 'naver' : 'poomgo'}">
                <span class="pathBadge">경로</span>
                <div class="pathText">${im.path}</div>
              </div>
            ` : ''}

            ${im.label ? `<div class="imgLabel">${im.label}</div>` : ''}

            ${im.desc ? `<div class="imgDesc">${im.desc}</div>` : ''}

            <div class="imgWrap">
              <img
                src="${im.thumb}"
                data-zoom="${im.zoom}"
                data-title="${im.label ? im.label : ('STEP ' + s.no)}"
                alt="${im.label ? im.label : ('STEP ' + s.no)}"
              />
              <p class="imgHint">이미지를 클릭하면 확대할 수 있어요. 닫기는 우측 상단 버튼 또는 ESC 키를 사용해주세요.</p>
            </div>
          </div>
        `).join('');

        section.innerHTML = `
          <div class="stepHeader">
            <div class="leftHead">
              <span class="badge" id="stepBadge${s.no}">STEP ${s.no}</span>
              <div class="hgroup">
                <p class="h-title">${s.title}</p>
                <p class="h-desc">${s.desc}</p>
              </div>
            </div>

            <div class="actions">
              <button class="btn" id="btnToggle${s.no}" style="display:none;" type="button">보기</button>
              <button class="btn btnOk" id="btnDone${s.no}" type="button">완료</button>
            </div>
          </div>

          <div class="lockHint">이전 STEP 완료 후 확인 가능합니다.</div>

          <div class="stepBody">
            <div class="imgRow">
              ${imagesHtml}
            </div>
          </div>
        `;

        container.appendChild(section);
      });

      renderLocks();
      renderFinalMessage();
    }

    function renderLocks() {
      for (let n = 1; n <= maxStep; n++) {
        const stepEl = document.getElementById(`step${n}`);
        if (stepEl) {
          stepEl.classList.toggle('isLocked', isLocked(n));
        }
      }
    }

    function collapseStep(n, on) {
      const el = document.getElementById(`step${n}`);
      if (el) el.classList.toggle('collapsed', !!on);
    }

    function toggleStep(n) {
      const el = document.getElementById(`step${n}`);
      if (!el) return;

      const collapsed = el.classList.contains('collapsed');
      collapseStep(n, !collapsed);

      const tbtn = document.getElementById(`btnToggle${n}`);
      if (tbtn) {
        tbtn.textContent = collapsed ? '접기' : '보기';
      }
    }

    function renderFinalMessage() {
      const final = document.getElementById('finalMsg');
      if (!final) return;
      final.style.display = isCompleted(maxStep) ? 'block' : 'none';
    }

    function markCompletedUI(n) {
      const badge = document.getElementById(`stepBadge${n}`);
      if (badge) {
        badge.classList.add('completed');
        badge.textContent = `✔ STEP ${n}`;
      }

      const doneBtn = document.getElementById(`btnDone${n}`);
      if (doneBtn) {
        doneBtn.disabled = true;
        doneBtn.style.display = 'none';
      }

      const tbtn = document.getElementById(`btnToggle${n}`);
      if (tbtn) {
        tbtn.style.display = 'inline-flex';
        tbtn.textContent = '보기';
      }
    }

    function setCompleted(n) {
      if (!isCompleted(n)) completedSteps.push(n);
      markCompletedUI(n);
      collapseStep(n, true);
      renderLocks();
      renderFinalMessage();
    }

    const zoomBack = document.getElementById('zoomBack');
    const zoomImg = document.getElementById('zoomImg');
    const zoomTitle = document.getElementById('zoomTitle');
    const zoomClose = document.getElementById('zoomClose');

    function openZoom(src, title) {
      if (!src) return;
      zoomImg.src = src;
      zoomTitle.textContent = title || '이미지 확대';
      zoomBack.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeZoom() {
      zoomBack.style.display = 'none';
      zoomImg.src = '';
      document.body.style.overflow = '';
    }

    zoomClose.addEventListener('click', closeZoom);
    zoomBack.addEventListener('click', (e) => {
      if (e.target === zoomBack) closeZoom();
    });

    const confirmBack = document.getElementById('confirmBack');
    const confirmCancel = document.getElementById('confirmCancel');
    const confirmOk = document.getElementById('confirmOk');
    let pendingStep = null;

    function openConfirm(stepNo) {
      pendingStep = stepNo;
      confirmBack.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeConfirm() {
      pendingStep = null;
      confirmBack.style.display = 'none';
      document.body.style.overflow = '';
    }

    confirmCancel.addEventListener('click', closeConfirm);
    confirmBack.addEventListener('click', (e) => {
      if (e.target === confirmBack) closeConfirm();
    });

    confirmOk.addEventListener('click', () => {
      if (!pendingStep) return;
      const n = pendingStep;
      closeConfirm();
      setCompleted(n);

      const next = n + 1;
      const nextEl = document.getElementById(`step${next}`);
      if (nextEl) {
        nextEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (zoomBack.style.display === 'flex') closeZoom();
        if (confirmBack.style.display === 'flex') closeConfirm();
      }
    });

    document.addEventListener('click', (e) => {
      const img = e.target.closest('img[data-zoom]');
      if (img) {
        const stepEl = img.closest('.step');
        if (stepEl && stepEl.classList.contains('isLocked')) return;
        openZoom(img.getAttribute('data-zoom'), img.getAttribute('data-title'));
        return;
      }

      const toggleBtn = e.target.closest('button[id^="btnToggle"]');
      if (toggleBtn) {
        const n = Number(toggleBtn.id.replace('btnToggle', ''));
        toggleStep(n);
        return;
      }

      const doneBtn = e.target.closest('button[id^="btnDone"]');
      if (doneBtn) {
        const n = Number(doneBtn.id.replace('btnDone', ''));
        if (isLocked(n) || isCompleted(n)) return;
        openConfirm(n);
      }
    });

    renderPage();
  </script>
</body>
</html>
