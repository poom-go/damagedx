<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>파손 등록</title>
</head>
<body>
  <h2>파손 등록</h2>

  <div>
    담당자: <input id="manager"><br><br>
    고객사: <input id="client"><br><br>

    항목:
    <select id="type">
      <option value="파손-반출">파손-반출</option>
      <option value="파손-변상">파손-변상</option>
    </select><br><br>

    바코드: <input id="barcode"><br><br>
    수량: <input id="qty" type="number" value="1" min="1"><br><br>
    메모: <input id="memo"><br><br>

    <button onclick="createReceipt()">등록 완료</button>
  </div>

  <hr>
  <div id="result"></div>

  <script src="config.js"></script>
  <script src="index.js"></script>
</body>
</html>
