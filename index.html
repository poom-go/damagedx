<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>품고 셀프 온보딩</title>

  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />

  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --primary:#03C75A;
      --primary-soft:#ecfdf3;
      --primary-deep:#02b350;
      --blue-soft:#eff6ff;
      --blue-line:#bfdbfe;
      --blue-text:#1d4ed8;
      --warn-soft:#fff7ed;
      --warn-line:#fed7aa;
      --warn-text:#9a3412;
      --shadow:0 12px 28px rgba(15,23,42,.08);
      --radius-xl:24px;
      --radius-lg:18px;
      --radius-md:14px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:"Pretendard Variable","Pretendard",system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
    }

    img{
      max-width:100%;
      height:auto;
      display:block;
    }

    button,input{
      font:inherit;
    }

    .wrap{
      max-width:1440px;
      margin:0 auto;
      padding:24px;
    }

    .top{
      margin-bottom:20px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:var(--primary-soft);
      color:var(--primary-deep);
      font-weight:800;
      font-size:13px;
      margin-bottom:12px;
    }

    h1{
      margin:0 0 8px;
      font-size:32px;
      line-height:1.2;
      letter-spacing:-.03em;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:15px;
    }

    .layout{
      display:grid;
      grid-template-columns:340px minmax(0,1fr);
      gap:24px;
      align-items:start;
    }

    .sidebar{
      position:sticky;
      top:20px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
    }

    .sidebar-card{
      padding:18px;
    }

    .side-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .side-title{
      font-size:18px;
      font-weight:800;
    }

    .progress{
      padding:7px 10px;
      border-radius:999px;
      background:var(--primary-soft);
      color:var(--primary-deep);
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .accordion{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .step-item{
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
      background:#fff;
    }

    .step-header{
      width:100%;
      border:none;
      background:#fff;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:12px;
      padding:14px;
      text-align:left;
    }

    .step-header:hover{
      background:#fafafa;
    }

    .step-item.active .step-header{
      background:linear-gradient(180deg,#fafffc 0%, #f3fff8 100%);
    }

    .step-num{
      width:34px;
      height:34px;
      border-radius:12px;
      display:grid;
      place-items:center;
      font-weight:800;
      background:#f3f4f6;
      flex:0 0 34px;
    }

    .step-item.active .step-num{
      background:var(--primary);
      color:#fff;
    }

    .step-main{
      min-width:0;
      flex:1;
    }

    .step-title{
      font-size:15px;
      font-weight:800;
      margin:0 0 4px;
      letter-spacing:-.02em;
    }

    .step-state{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#d1d5db;
    }

    .dot.done{background:var(--primary)}
    .dot.current{background:#2563eb}

    .chev{
      font-size:18px;
      color:#6b7280;
      transition:transform .2s ease;
      flex:0 0 auto;
    }

    .step-item.active .chev{
      transform:rotate(180deg);
    }

    .step-body{
      display:none;
      border-top:1px solid var(--line);
      padding:12px 14px 14px;
      background:#fcfcfd;
    }

    .step-item.active .step-body{
      display:block;
    }

    .step-sublist{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .step-subitem{
      display:flex;
      gap:8px;
      font-size:13px;
      color:#374151;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .side-note{
      margin-top:14px;
      padding:12px 14px;
      border-radius:16px;
      background:#f9fafb;
      border:1px solid var(--line);
      font-size:13px;
      color:var(--muted);
    }

    .content{
      padding:24px;
      min-width:0;
      overflow:hidden;
    }

    .hero{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .hero-left{
      min-width:0;
    }

    .step-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:#f3f4f6;
      color:#374151;
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
    }

    .hero h2{
      margin:0 0 8px;
      font-size:30px;
      line-height:1.2;
      letter-spacing:-.03em;
      word-break:keep-all;
    }

    .hero p{
      margin:0;
      color:var(--muted);
      font-size:15px;
      word-break:keep-all;
    }

    .hero-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-weight:800;
      cursor:pointer;
    }

    .btn.secondary{
      background:#fff;
      border:1px solid var(--line);
      color:#111827;
    }

    .btn.primary{
      background:var(--primary);
      color:#fff;
    }

    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }

    .lead{
      padding:18px;
      border-radius:20px;
      border:1px solid rgba(3,199,90,.2);
      background:linear-gradient(180deg,#fbfffd 0%, #f3fff8 100%);
      margin-bottom:18px;
    }

    .lead-label{
      font-size:13px;
      font-weight:900;
      color:var(--primary-deep);
      margin-bottom:8px;
    }

    .lead-text{
      margin:0;
      font-size:18px;
      font-weight:800;
      letter-spacing:-.02em;
      word-break:keep-all;
    }

    .main-grid{
      display:grid;
      grid-template-columns:minmax(0,1.1fr) minmax(320px,.9fr);
      gap:18px;
    }

    .section{
      border:1px solid var(--line);
      border-radius:20px;
      padding:20px;
      min-width:0;
      overflow:hidden;
    }

    .section h3{
      margin:0 0 12px;
      font-size:18px;
      letter-spacing:-.02em;
    }

    .flow-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin:0;
      padding:0;
      list-style:none;
    }

    .flow-list li{
      display:flex;
      gap:10px;
      padding:12px 14px;
      border-radius:16px;
      background:#f9fafb;
      border:1px solid #eef2f7;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .check-icon{
      width:22px;
      height:22px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:#e5e7eb;
      font-size:12px;
      font-weight:900;
      flex:0 0 22px;
    }

    .blocks{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-top:18px;
      min-width:0;
    }

    .block{
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      background:#fff;
      min-width:0;
      overflow:hidden;
    }

    .block h4{
      margin:0 0 8px;
      font-size:16px;
      letter-spacing:-.02em;
      word-break:keep-all;
    }

    .block p{
      margin:0;
      font-size:14px;
      color:#374151;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .info-box,.warn-box{
      border-radius:18px;
      padding:16px;
      border:1px solid;
      margin-top:12px;
      min-width:0;
      overflow:hidden;
    }

    .info-box{
      background:var(--blue-soft);
      border-color:var(--blue-line);
      color:var(--blue-text);
    }

    .warn-box{
      background:var(--warn-soft);
      border-color:var(--warn-line);
      color:var(--warn-text);
    }

    .box-title{
      font-size:13px;
      font-weight:900;
      margin-bottom:8px;
    }

    .mini-list{
      margin:0;
      padding-left:18px;
    }

    .mini-list li{
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .mini-list li + li{
      margin-top:6px;
    }

    .path{
      margin-top:10px;
      padding:14px;
      border-radius:16px;
      background:#0f172a;
      color:#f8fafc;
      font-size:14px;
      font-weight:700;
      white-space:pre-line;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .placeholder{
      border:1px dashed #cbd5e1;
      border-radius:18px;
      background:linear-gradient(180deg,#fcfcfd 0%, #f8fafc 100%);
      min-height:220px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#64748b;
      font-size:14px;
      font-weight:700;
      padding:20px;
      word-break:keep-all;
    }

    .table-wrap{
      width:100%;
      overflow-x:auto;
      border:1px solid var(--line);
      border-radius:16px;
      margin-top:10px;
      -webkit-overflow-scrolling:touch;
    }

    table{
      width:100%;
      min-width:520px;
      border-collapse:collapse;
      background:#fff;
    }

    th,td{
      padding:12px 14px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
      font-size:14px;
      word-break:break-word;
    }

    th{
      background:#f9fafb;
      font-size:13px;
      font-weight:800;
      color:#374151;
    }

    .check-area{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:12px;
    }

    .check-row{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fafafa;
      min-width:0;
    }

    .check-row input{
      width:18px;
      height:18px;
      margin-top:2px;
      accent-color:var(--primary);
      flex:0 0 auto;
    }

    .check-row span{
      font-size:14px;
      font-weight:700;
      word-break:break-word;
      overflow-wrap:anywhere;
    }

    .footer-nav{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-top:18px;
      flex-wrap:wrap;
    }

    @media (max-width:1100px){
      .layout{
        grid-template-columns:1fr;
      }
      .sidebar{
        position:static;
      }
      .main-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width:640px){
      .wrap{padding:14px}
      h1{font-size:26px}
      .hero h2{font-size:24px}
      .content{padding:18px}
      .step-header{padding:12px}
      .section{padding:16px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="badge">셀프 세팅 가이드</div>
      <h1>품고 셀프 온보딩</h1>
      <p class="sub">질문 없이 순서대로 따라가면 세팅이 완료되도록 구성한 셀프 온보딩입니다.</p>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <div class="card sidebar-card">
          <div class="side-head">
            <div class="side-title">진행 단계</div>
            <div class="progress" id="progressText">0 / 5 완료</div>
          </div>

          <div class="accordion" id="stepAccordion"></div>

          <div class="side-note">
            각 STEP의 완료 항목을 모두 체크하면 해당 STEP은 완료 처리되며 자동으로 닫힙니다.
          </div>
        </div>
      </aside>

      <main class="card content">
        <div class="hero">
          <div class="hero-left">
            <div class="step-chip" id="heroChip">STEP 1</div>
            <h2 id="heroTitle">고객사 등록</h2>
            <p id="heroDesc"></p>
          </div>

          <div class="hero-actions">
            <button class="btn secondary" id="resetBtn" type="button">체크 초기화</button>
          </div>
        </div>

        <div class="lead">
          <div class="lead-label">지금 해야 할 일</div>
          <p class="lead-text" id="leadText"></p>
        </div>

        <div class="main-grid">
          <section class="section">
            <h3>진행 순서</h3>
            <ul class="flow-list" id="flowList"></ul>
            <div class="blocks" id="detailBlocks"></div>
          </section>

          <section class="section">
            <h3>완료 기준</h3>
            <div id="rightInfo"></div>

            <div class="info-box">
              <div class="box-title">다음 단계로 넘어가기 전 확인</div>
              <div class="check-area" id="checkArea"></div>
            </div>
          </section>
        </div>

        <div class="footer-nav">
          <button class="btn secondary" id="prevBtn" type="button">이전 단계</button>
          <button class="btn primary" id="nextBtn" type="button">다음 단계</button>
        </div>
      </main>
    </div>
  </div>

  <script>

      {

          {

          }
        ],
        checks: [

      },
      {
        id: "ndelivery",
        title: "N배송 설정",

        lead: "연결 상품과 재고를 점검한 뒤 N배송 설정을 완료해주세요.",
        items: [
          {
            title: "연결 상품 점검",
            type: "section",
            body: "SKU와 판매처 상품 연결 상태를 확인해주세요."
          },
          {
            title: "재고 점검",
            type: "section",
            body: "입고 재고가 정상 반영되었는지 확인해주세요."
          },
          {
            title: "N배송 설정하기",
            type: "section",
            body: "N배송 출고 설정을 진행해주세요."
          }
        ],
        checks: [
          "연결 상품 점검 완료",
          "재고 점검 완료",
          "N배송 설정 완료"
        ]
      }
    ];

    const STORAGE_KEY = "poomgo_self_onboarding_v2";

    const state = loadState();
    let currentIndex = state.currentIndex ?? 0;
    let openStepId = state.openStepId ?? DATA[0].id;

    const stepAccordion = document.getElementById("stepAccordion");
    const progressText = document.getElementById("progressText");
    const heroChip = document.getElementById("heroChip");
    const heroTitle = document.getElementById("heroTitle");
    const heroDesc = document.getElementById("heroDesc");
    const leadText = document.getElementById("leadText");
    const flowList = document.getElementById("flowList");
    const detailBlocks = document.getElementById("detailBlocks");
    const rightInfo = document.getElementById("rightInfo");
    const checkArea = document.getElementById("checkArea");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : { checks: {}, currentIndex: 0, openStepId: DATA[0]?.id };
      } catch (e) {
        return { checks: {}, currentIndex: 0, openStepId: DATA[0]?.id };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        checks: state.checks || {},
        currentIndex,
        openStepId
      }));
    }

    function getChecks(stepId) {
      if (!state.checks) state.checks = {};
      if (!state.checks[stepId]) state.checks[stepId] = [];
      return state.checks[stepId];
    }

    function isStepDone(step) {
      const arr = getChecks(step.id);
      return step.checks.length > 0 && step.checks.every((_, i) => !!arr[i]);
    }

    function getStatus(step, idx) {
      if (isStepDone(step)) return { text: "완료", cls: "done" };
      if (idx === currentIndex) return { text: "진행중", cls: "current" };
      return { text: "대기", cls: "" };
    }

    function renderAccordion() {
      stepAccordion.innerHTML = "";
      const doneCount = DATA.filter(isStepDone).length;
      progressText.textContent = `${doneCount} / ${DATA.length} 완료`;

      DATA.forEach((step, idx) => {
        const status = getStatus(step, idx);
        const item = document.createElement("div");
        item.className = "step-item" + (openStepId === step.id ? " active" : "");

        const subItemsHtml = step.items.map(x => `
          <div class="step-subitem">
            <span>ㄴ</span>
            <span>${escapeHtml(x.title)}</span>
          </div>
        `).join("");

        item.innerHTML = `
          <button class="step-header" type="button">
            <div class="step-num">${idx + 1}</div>
            <div class="step-main">
              <div class="step-title">${escapeHtml(step.title)}</div>
              <div class="step-state">
                <span class="dot ${status.cls}"></span>
                <span>${status.text}</span>
              </div>
            </div>
            <div class="chev">⌄</div>
          </button>
          <div class="step-body">
            <div class="step-sublist">${subItemsHtml}</div>
          </div>
        `;

        const header = item.querySelector(".step-header");
        header.addEventListener("click", () => {
          currentIndex = idx;
          openStepId = openStepId === step.id ? "" : step.id;
          saveState();
          render();
        });

        stepAccordion.appendChild(item);
      });
    }

    function renderMain() {
      const step = DATA[currentIndex];
      heroChip.textContent = `STEP ${currentIndex + 1}`;
      heroTitle.textContent = step.title;
      heroDesc.textContent = step.desc;
      leadText.textContent = step.lead;

      flowList.innerHTML = "";
      step.items.forEach(item => {
        const li = document.createElement("li");
        li.innerHTML = `<span class="check-icon">✓</span><div>${escapeHtml(item.title)}</div>`;
        flowList.appendChild(li);
      });

      detailBlocks.innerHTML = "";
      step.items.forEach(item => {
        const block = document.createElement("div");
        block.className = "block";
        block.innerHTML = renderItem(item);
        detailBlocks.appendChild(block);
      });

      rightInfo.innerHTML = renderRightInfo(step);

      checkArea.innerHTML = "";
      const checks = getChecks(step.id);

      step.checks.forEach((label, i) => {
        const row = document.createElement("label");
        row.className = "check-row";
        row.innerHTML = `
          <input type="checkbox" ${checks[i] ? "checked" : ""}>
          <span>${escapeHtml(label)}</span>
        `;

        row.querySelector("input").addEventListener("change", (e) => {
          checks[i] = e.target.checked;

          if (isStepDone(step)) {
            openStepId = "";
            if (currentIndex < DATA.length - 1) {
              currentIndex += 1;
              openStepId = DATA[currentIndex].id;
            }
          } else {
            openStepId = step.id;
          }

          saveState();
          render();
        });

        checkArea.appendChild(row);
      });

      prevBtn.disabled = currentIndex === 0;
      nextBtn.disabled = currentIndex === DATA.length - 1;
    }

    function renderItem(item) {
      if (item.type === "path") {
        return `
          <h4>${escapeHtml(item.title)}</h4>
          <div class="path">${escapeHtml(item.body).replaceAll(" > ", "\n→ ")}</div>
        `;
      }

      if (item.type === "notice") {
        return `
          <h4>${escapeHtml(item.title)}</h4>
          <p>${escapeHtml(item.body)}</p>
          <div class="warn-box">
            <div class="box-title">반드시 확인해주세요</div>
            <ul class="mini-list">
              ${(item.notice || []).map(x => `<li>${escapeHtml(x)}</li>`).join("")}
            </ul>
          </div>
        `;
      }

      if (item.type === "placeholder") {
        return `
          <h4>${escapeHtml(item.title)}</h4>
          <div class="placeholder">${escapeHtml(item.body)}</div>
        `;
      }

      if (item.type === "custom" && item.body === "skuGuide") {
        return `
          <h4>SKU 등록</h4>
          <div class="placeholder">여기에 SKU 등록 화면 이미지를 넣어주세요. 추천: ① SKU명 ② 바코드 ③ 보관온도 ④ 소비기한 ⑤ 로트번호 ⑥ 보관사이즈 ⑦ SKU유형 번호 표시</div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>항목</th><th>입력 기준</th></tr>
              </thead>
              <tbody>
                <tr><td>SKU명</td><td>모두가 식별 가능한 형태로 입력</td></tr>
                <tr><td>바코드</td><td>실물 바코드와 동일하게 입력</td></tr>
                <tr><td>보관 온도</td><td>상온</td></tr>
                <tr><td>소비기한 관리여부</td><td>소비기한을 관리하는 품목인 경우에만 관리 선택</td></tr>
                <tr><td>로트번호 관리여부</td><td>제조 로트를 관리하는 품목인 경우에만 관리 선택</td></tr>
                <tr><td>보관사이즈</td><td>모두 1 입력</td></tr>
                <tr><td>SKU 유형</td><td>상품 선택</td></tr>
              </tbody>
            </table>
          </div>

          <div class="info-box">
            <div class="box-title">SKU명 예시</div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr><th>기준</th><th>상품명</th></tr>
                </thead>
                <tbody>
                  <tr><td>식별 가능</td><td>꽃물 틴트 1호 체리, 꽃물 틴트 2호 딸기</td></tr>
                  <tr><td>식별 불가</td><td>체리, 딸기</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <div class="warn-box">
            <div class="box-title">주의사항</div>
            <ul class="mini-list">
              <li>관리하지 않는 상품을 관리함으로 설정하지 않도록 주의해주세요. 수정이 불가합니다.</li>
              <li>사은품 선택 시 품고 전산에 등록되지 않으므로 상품으로 선택해주세요.</li>
              <li>최초 입고 SKU는 품고에서 체적 정보를 측정하여 자동 반영됩니다.</li>
            </ul>
          </div>
        `;
      }

      return `
        <h4>${escapeHtml(item.title)}</h4>
        <p>${escapeHtml(item.body)}</p>
        ${
          item.notice?.length
            ? `
              <div class="info-box">
                <div class="box-title">확인해주세요</div>
                <ul class="mini-list">
                  ${item.notice.map(x => `<li>${escapeHtml(x)}</li>`).join("")}
                </ul>
              </div>
            `
            : ""
        }
      `;
    }

    function renderRightInfo(step) {
      if (step.id === "client_register") {
        return `
          <div class="info-box">
            <div class="box-title">완료 기준</div>
            <ul class="mini-list">
              <li>품고 나우 로그인 가능</li>
              <li>필요한 구성원 계정 추가 완료</li>
            </ul>
          </div>
          <div class="warn-box">
            <div class="box-title">문제가 발생한 경우</div>
            <ul class="mini-list">
              <li>고객사 등록 버튼이 보이지 않는 경우</li>
              <li>메일 수신 후 24시간이 초과된 경우</li>
              <li>사업자 주소 / 브랜드 고객센터 대표번호 / 반품지 주소 / 담당자명 / 연락처 / 이메일 정보를 전달해주세요.</li>
            </ul>
          </div>
        `;
      }

      if (step.id === "fulfillment") {
        return `
          <div class="info-box">
            <div class="box-title">완료 기준</div>
            <ul class="mini-list">
              <li>물류사 품고 확인 완료</li>
              <li>연동 상태 연동중 확인 완료</li>
              <li>불필요한 타 물류사 연동 철회 완료</li>
            </ul>
          </div>
        `;
      }

      if (step.id === "sku") {
        return `
          <div class="info-box">
            <div class="box-title">완료 기준</div>
            <ul class="mini-list">
              <li>SKU 등록 완료</li>
              <li>판매처 상품과 연결상품 매핑 완료</li>
            </ul>
          </div>
          <div class="warn-box">
            <div class="box-title">자주 틀리는 항목</div>
            <ul class="mini-list">
              <li>SKU명을 옵션 없이 입력</li>
              <li>실물과 다른 바코드 입력</li>
              <li>SKU 유형을 사은품으로 선택</li>
            </ul>
          </div>
        `;
      }

      if (step.id === "inbound") {
        return `
          <div class="info-box">
            <div class="box-title">완료 기준</div>
            <ul class="mini-list">
              <li>입고 기준 확인 완료</li>
              <li>포장 방법 확인 완료</li>
            </ul>
          </div>
          <div class="warn-box">
            <div class="box-title">주의</div>
            <ul class="mini-list">
              <li>기준 미준수 시 입고 지연 또는 추가 작업 비용이 발생할 수 있습니다.</li>
            </ul>
          </div>
        `;
      }

      return `
        <div class="info-box">
          <div class="box-title">완료 기준</div>
          <ul class="mini-list">
            <li>연결 상품 이상 없음</li>
            <li>재고 정상 반영</li>
            <li>N배송 설정 완료</li>
          </ul>
        </div>
      `;
    }

    function render() {
      renderAccordion();
      renderMain();
    }

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    prevBtn.addEventListener("click", () => {
      if (currentIndex > 0) {
        currentIndex -= 1;
        openStepId = DATA[currentIndex].id;
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    nextBtn.addEventListener("click", () => {
      if (currentIndex < DATA.length - 1) {
        currentIndex += 1;
        openStepId = DATA[currentIndex].id;
        saveState();
        render();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    });

    resetBtn.addEventListener("click", () => {
      if (!confirm("체크한 완료 항목을 모두 초기화할까요?")) return;
      localStorage.removeItem(STORAGE_KEY);
      state.checks = {};
      currentIndex = 0;
      openStepId = DATA[0].id;
      saveState();
      render();
    });

    render();
  </script>
</body>
</html>
